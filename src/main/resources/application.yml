server:
  port: ${PORT:5001}
  servlet:
    context-path: /

spring:
  application:
    name: agency-backend

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:agency_db}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST:smtp.zoho.in}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

  mvc:
    pathmatch:
      use-suffix-pattern: false

  async:
    executor:
      thread:
        core-pool-size: 2
        max-pool-size: 5

agency:
  jwt:
    secret: ${JWT_SECRET:VGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdG9rZW5zIGluIHByb2R1Y3Rpb24=}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  admin-email: ${ADMIN_EMAIL:ragulsiva@zohomail.in}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    operationsSorter: method

logging:
  level:
    com.agency.backend: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
